# Dependabot for PONOdata/.template-staging/Pono-toolkit
# Fleet QA config, normalized 2026-06-12.
# Anchor: CLAUDE.md "CI / Bot / Workflow Hygiene" HARD requirement (2026-05-17).
# Weekly Monday version updates; security updates fire daily regardless.
# minor and patch grouped per ecosystem and directory to cut PR volume.

version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    commit-message:
      prefix: "deps"
    groups:
      nuget-root-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/bridges-imessage/windows"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    commit-message:
      prefix: "deps"
    groups:
      pip-bridges-imessage-windows-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"
    commit-message:
      prefix: "deps"
    groups:
      github-actions-root-minor-patch:
        update-types: ["minor", "patch"]
