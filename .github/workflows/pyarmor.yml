name: PyArmor Obfuscation (CI license 008184)

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install PyArmor
        run: pip install pyarmor

      - name: Register CI license
        env:
          PYARMOR_CI_LICENSE: ${{ secrets.PYARMOR_CI_LICENSE }}
        run: |
          if [ -z "$PYARMOR_CI_LICENSE" ]; then
            echo "::error::PYARMOR_CI_LICENSE secret not set (expected base64-encoded pyarmor-vax-008184 zip)"
            exit 1
          fi
          printf '%s' "$PYARMOR_CI_LICENSE" | base64 -d > /tmp/license.zip
          pyarmor reg /tmp/license.zip
          rm /tmp/license.zip
          pyarmor -v | head -3

      - name: Discover Python source dirs
        id: discover
        run: |
          dirs=$(find . -name "*.py" \
            -not -path "./dist/*" \
            -not -path "./.git/*" \
            -not -path "./tests/*" \
            -not -path "./__pycache__/*" \
            -not -path "./.venv/*" \
            -not -path "./build/*" \
            -not -path "./node_modules/*" \
            | xargs -I {} dirname {} | sort -u | head -20 | tr '\n' ' ')
          echo "Discovered source dirs: $dirs"
          echo "dirs=$dirs" >> $GITHUB_OUTPUT

      - name: Obfuscate (linux.x86_64, RFT+JIT+mix-str+assert-call)
        run: |
          pyarmor gen \
            --platform linux.x86_64 \
            --enable rft \
            --enable jit \
            --mix-str \
            --assert-call \
            --output dist/ \
            -r ${{ steps.discover.outputs.dirs }}
          ls -la dist/
          find dist -name "pyarmor_runtime.so" -o -name "pyarmor_runtime.pyd"

      - name: Verify .so present, no .pyd
        run: |
          so_count=$(find dist -name "pyarmor_runtime.so" | wc -l)
          pyd_count=$(find dist -name "pyarmor_runtime.pyd" | wc -l)
          if [ "$so_count" -lt 1 ]; then
            echo "::error::No pyarmor_runtime.so produced; --platform linux.x86_64 may not have applied"
            exit 1
          fi
          if [ "$pyd_count" -gt 0 ]; then
            echo "::error::Windows .pyd produced; CI runner platform misconfigured"
            exit 1
          fi
          echo "OK: $so_count .so runtime(s), 0 .pyd"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: pyarmor-dist
          path: dist/
          retention-days: 30
