name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
      channel:
        description: 'Release channel'
        required: true
        default: Stable
        type: choice
        options:
          - Stable
          - Beta
          - Dev
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-2022

    steps:
    - name: Checkout
      uses: actions/checkout@v5
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x
        cache: true
        cache-dependency-path: '**/*.csproj'
        
    - name: Resolve release metadata
      id: release_meta
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        INPUT_VERSION: ${{ github.event.inputs.version }}
        INPUT_CHANNEL: ${{ github.event.inputs.channel }}
        REF_NAME: ${{ github.ref_name }}
        EVENT_NAME: ${{ github.event_name }}
      run: |
        $channel = "Stable"
        $prerelease = "false"
        $targetCommitish = "master"

        # 1. Determine Channel and Version
        if ($env:EVENT_NAME -eq "workflow_dispatch") {
            $version = $env:INPUT_VERSION
            $channel = $env:INPUT_CHANNEL

            if ($version -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
                Write-Error "Invalid version '$version'. Expected format: X.Y.Z or X.Y.Z.W"
                exit 1
            }
            $tagName = "v$version"
        } else {
            # Release publish trigger
            $tagName = "${{ github.event.release.tag_name }}"
            $version = $tagName -replace '^v', ''
            
            # Retrieve release metadata directly from the event payload
            $isPrerelease = "${{ github.event.release.prerelease }}"
            $targetCommitish = "${{ github.event.release.target_commitish }}"

            if ($targetCommitish -eq "dev") {
                $channel = "Dev"
            } elseif ($isPrerelease -eq "true") {
                $channel = "Beta"
            } else {
                $channel = "Stable"
            }
        }

        # 2. Apply your exact branch/release rules
        switch ($channel) {
            "Stable" {
                $prerelease = "false"
                $targetCommitish = "master"
            }
            "Beta" {
                $prerelease = "true"
                $targetCommitish = "master"
            }
            "Dev" {
                $prerelease = "false"
                $targetCommitish = "dev"
            }
            default {
                Write-Error "Unsupported channel: $channel"
                exit 1
            }
        }

        # 3. Output for the Release step
        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "channel=$channel" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "target_commitish=$targetCommitish" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      shell: powershell

    - name: Restore
      run: dotnet restore

    # Three-tier signing detection mirrors build.yml.
    # Pono Toolkit fork uses Azure Trusted Signing on PONOdata's fso-kimo profile.
    # Upstream LLT_CERT_PFX path is preserved for upstream maintainer scenarios.
    - name: Detect signing path
      id: signing
      env:
        LLT_CERT_PFX: ${{ secrets.LLT_CERT_PFX }}
        AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        AZURE_SIGNING_ENDPOINT: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
      run: |
        if ($env:LLT_CERT_PFX) {
          "path=pfx" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Signing path: PFX"
        } elseif ($env:AZURE_CLIENT_ID -and $env:AZURE_TENANT_ID -and $env:AZURE_SIGNING_ENDPOINT) {
          "path=azure" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Signing path: Azure Trusted Signing"
        } else {
          "path=raw" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "::warning::No signing credentials available. Building unsigned via manifest fallback."
        }
      shell: powershell

    # PFX path (upstream / canonical).
    - name: Restore identity package signing key (PFX)
      if: steps.signing.outputs.path == 'pfx'
      env:
        LLT_CERT_PFX: ${{ secrets.LLT_CERT_PFX }}
      run: |
        [IO.File]::WriteAllBytes("LenovoLegionToolkit.pfx", [Convert]::FromBase64String($env:LLT_CERT_PFX))
      shell: powershell
    - name: Build (PFX)
      if: steps.signing.outputs.path == 'pfx'
      env:
        LLT_CERT_PASSWORD: ${{ secrets.LLT_CERT_PASSWORD }}
      run: .\make_action.bat ${{ steps.release_meta.outputs.version }}

    # Azure Trusted Signing path (Pono Toolkit canonical). make_action.bat expects
    # a PFX so it can call SignTool internally; we satisfy that with a transient
    # self-signed PFX whose signature is then replaced by a real Azure Trusted
    # Signing signature on the output installer.
    - name: Generate transient PFX for build (Azure path)
      if: steps.signing.outputs.path == 'azure'
      run: |
        $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=Pono Toolkit Transient Build" -KeyAlgorithm RSA -KeyLength 2048 -CertStoreLocation Cert:\CurrentUser\My
        $password = ConvertTo-SecureString -String "transient-fork-build" -Force -AsPlainText
        Export-PfxCertificate -Cert $cert -FilePath "LenovoLegionToolkit.pfx" -Password $password | Out-Null
        "LLT_CERT_PASSWORD=transient-fork-build" | Out-File -FilePath $env:GITHUB_ENV -Append
      shell: powershell
    - name: Build (Azure)
      if: steps.signing.outputs.path == 'azure'
      run: .\make_action.bat ${{ steps.release_meta.outputs.version }}
    - name: Azure login (federated identity)
      if: steps.signing.outputs.path == 'azure'
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    - name: Re-sign installer with Azure Trusted Signing
      if: steps.signing.outputs.path == 'azure'
      uses: azure/trusted-signing-action@v0.5.1
      with:
        endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
        trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT_NAME }}
        certificate-profile-name: ${{ secrets.AZURE_SIGNING_PROFILE_NAME }}
        files-folder: build_installer
        files-folder-filter: exe
        file-digest: SHA256
        timestamp-rfc3161: http://timestamp.digicert.com
        timestamp-digest: SHA256

    # Raw / unsigned fallback (no signing creds at all). Uses the manifest
    # fallback in build_identity_package.ps1 so no PFX or signing tools are needed.
    - name: Build (raw / unsigned)
      if: steps.signing.outputs.path == 'raw'
      run: .\make_action.bat ${{ steps.release_meta.outputs.version }} raw

    - name: Rename installer
      run: |
        $oldPath = "build_installer\PonoToolkitSetup.exe"
        $newPath = "build_installer\PonoToolkitSetup-v${{ steps.release_meta.outputs.version }}.exe"

        if (Test-Path $oldPath) {
            Rename-Item -Path $oldPath -NewName (Split-Path $newPath -Leaf)
        } else {
            Write-Error "Build artifact not found at $oldPath"
            exit 1
        }
      shell: powershell

    - name: Verify installer
      run: |
        $installerPath = "build_installer\PonoToolkitSetup-v${{ steps.release_meta.outputs.version }}.exe"
        if (-not (Test-Path $installerPath)) {
          Write-Error "Installer file not found at $installerPath"
          exit 1
        }
      shell: powershell

    - name: Update Release (Published)
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2.0.8
      with:
        tag_name: ${{ steps.release_meta.outputs.tag_name }}
        target_commitish: ${{ steps.release_meta.outputs.target_commitish }}
        prerelease: ${{ steps.release_meta.outputs.prerelease }}
        name: Pono Toolkit v${{ steps.release_meta.outputs.version }} (${{ steps.release_meta.outputs.channel }})
        files: build_installer/PonoToolkitSetup-v${{ steps.release_meta.outputs.version }}.exe
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Draft Release (Manual)
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2.0.8
      with:
        draft: true
        tag_name: ${{ steps.release_meta.outputs.tag_name }}
        target_commitish: ${{ steps.release_meta.outputs.target_commitish }}
        prerelease: ${{ steps.release_meta.outputs.prerelease }}
        name: Pono Toolkit v${{ steps.release_meta.outputs.version }} (${{ steps.release_meta.outputs.channel }})
        body: |
          ## Release Notes
          Version ${{ steps.release_meta.outputs.version }}
          Channel: ${{ steps.release_meta.outputs.channel }}
        files: build_installer/PonoToolkitSetup-v${{ steps.release_meta.outputs.version }}.exe
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: installer-v${{ steps.release_meta.outputs.version }}-${{ steps.release_meta.outputs.channel }}
        path: build_installer/PonoToolkitSetup-v${{ steps.release_meta.outputs.version }}.exe