# CodeRabbit configuration for Pono Toolkit
# Reference: https://docs.coderabbit.ai/guides/configure-coderabbit

language: en-US

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_filters:
    - "!docs/**"
    - "!**/Resources/Resource.*.resx"
    - "!**/Resource.Designer.cs"
    - "!build/**"
    - "!build_installer/**"
    - "!BuildLLT/**"

  path_instructions:
    - path: "LenovoLegionToolkit.Lib/Controllers/LampArrayController.cs"
      instructions: "Render loop runs at 30 Hz. Flag any per-frame allocation, per-lamp computation that could be hoisted, or capability probe inside the hot path."
    - path: "LenovoLegionToolkit.Lib/System/AirplaneMode.cs"
      instructions: "Coordinates registry write to HKLM\\SYSTEM\\CurrentControlSet\\Control\\RadioManagement\\SystemRadioState plus an RmSvc bounce. Verify Toggle() locking, the bounce drain pattern, and Open() fallback on every code path."
    - path: "LenovoLegionToolkit.WPF/Utils/NotificationsManager.cs"
      instructions: "Four parallel switch expressions on NotificationType. Adding a new type requires updating allow, symbol, overlaySymbol, and text together. Default arms must remain safe defaults, not throws."
    - path: "**/AbstractWMIListener.cs"
      instructions: "Verify Start/Stop dispose pairing and that the Handler async void is wrapped in a top-level try/catch."

  tools:
    github-checks:
      enabled: true
    languagetool:
      enabled: false

chat:
  auto_reply: true
