# CodeRabbit v3 configuration for the Pono / Brofalo fleet
# Posture: max-strict, block-on-defect. pre_merge_checks at error mode.
# Schema anchor: https://docs.coderabbit.ai/reference/yaml-template (fetched 2026-05-24)
# Standing-order anchors:
#   - CLAUDE.md "CI / Bot / Workflow Hygiene" HARD requirement (banked 2026-05-17)
#   - CLAUDE.md "Zero noise output" standing rule (banked 2026-05-19)
#   - CLAUDE.md "Foundation-Flawless Before Scope-Addition" (Class 249, banked 2026-05-24)
#   - CLAUDE.md "Signed-first Supply Chain" HARD requirement (Class 242, 2026-05-23)
#   - CLAUDE.md "Tier-3 Edit Gate" (Class 226, 2026-05-18)
#   - CLAUDE.md "Security baseline" + "Purple team posture"
#   - feedback_pr_standard_zero_noise_2026_05_19.md
#   - feedback_docker_timeout_rm_ghost_containers_2026_05_23.md
# Substrate evolution: v3 escalates v2's warning mode to error after Jack's
# explicit "Root approval" directive 2026-05-24. Bypass for v1->V2->V3
# evolution-pattern dwell requirement granted by explicit root approval per
# the substrate-evolution clause.

language: en-US

# Zero-noise voice. CR's own review text must follow the same standards it
# enforces on PRs.
tone_instructions: >-
  Direct. State findings; cite file:line; recommend the fix. No em dashes.
  No marketing words (elegant, robust, comprehensive, seamless, beautifully,
  carefully, gracefully). No first-person plural. No schoolbook step
  enumeration. No "this commit" / "this change" / "we observe" narrative.
  No anchor lines (Anchored on:, Pair:, see HANDOFF-). No internal
  classification prefixes (Class N, G01, G04, Sev1, Tier-A, Tier-B, F02,
  N1, N24, [REVIEW-ONLY], [WIP], [DRAFT]).

early_access: true

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  changed_files_summary: true
  collapse_walkthrough: true
  estimate_code_review_effort: true
  review_status: true
  review_details: true
  sequence_diagrams: true
  poem: false
  in_progress_fortune: false
  enable_prompt_for_ai_agents: true

  # Block merge on findings. With request_changes_workflow: true above, a
  # failing commit status holds the PR.
  commit_status: true
  fail_commit_status: true

  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  auto_apply_labels: true
  suggested_reviewers: false
  auto_assign_reviewers: false

  labeling_instructions:
    - label: security
      instructions: >-
        Apply when the change touches authentication, authorization, secrets,
        crypto, input validation, or any code path that handles untrusted
        input. Also apply on edits to dependencies that pull in transitive
        security-sensitive packages.
    - label: substrate
      instructions: >-
        Apply when the change touches a load-bearing hook, a Tier-3 path
        (CLAUDE.md, skill_pono_*.md, *.service, *.timer, maui-wall/*.py,
        nodecode.py, install.sh), or a tools/ helper in TIER3_PATTERNS.
    - label: ci-hygiene
      instructions: >-
        Apply when the change touches .github/workflows/*, Dockerfile,
        requirements*.txt, pyproject.toml, or any deploy gate.
    - label: docs
      instructions: >-
        Apply when the change is documentation-only (README, *.md under docs/,
        plans, handoffs).
    - label: experimental
      instructions: >-
        Apply when the change lives under scratch/, .tmp/, or is explicitly
        marked WIP / DRAFT / spike in the diff or PR body.
    - label: foundation-flawless-required
      instructions: >-
        Apply when the change is substrate-behavior-changing (new endpoint,
        new pipeline stage, new container, new config category, new
        flag-detection class, new egress path, new hook). Triggers smoke
        matrix requirement per Class 249.
    - label: signed-supply-chain-required
      instructions: >-
        Apply when the change touches a production-class firmware/OS/runtime
        base. Triggers signed-first scorecard requirement per Class 242.

  slop_detection:
    enabled: true
    label: low-quality

  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - main
      - master
    ignore_title_keywords:
      - "wip:"
      - "draft:"
    # Removed [skip review] (no opt-out at v3). Removed dependabot/renovate
    # from ignore_usernames (dep PRs need review for CVE exposure). Keep
    # github-actions[bot] ignored (internal CI commits).
    ignore_usernames:
      - github-actions[bot]

  path_filters:
    - "!**/__pycache__/**"
    - "!**/*.pyc"
    - "!**/.venv/**"
    - "!**/venv/**"
    - "!**/.tox/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/*.egg-info/**"
    - "!**/.pytest_cache/**"
    - "!**/.mypy_cache/**"
    - "!**/.ruff_cache/**"
    - "!**/node_modules/**"
    - "!**/.git/**"
    - "!**/.next/**"
    - "!**/.turbo/**"
    - "!logs/**"
    - "!**/*.log"
    - "!state/**/*.json"
    - "!**/*.min.js"
    - "!**/*.min.css"
    - "!**/vendor/**"
    - "!**/third_party/**"
    - "!**/*.lock"
    - "!**/package-lock.json"
    - "!**/yarn.lock"
    - "!**/pnpm-lock.yaml"
    - "!**/poetry.lock"
    - "!**/uv.lock"
    - "!**/Cargo.lock"
    - "!**/go.sum"

  path_instructions:
    - path: "**/*.py"
      instructions: |
        Python service code. Max-strict posture (v3).
        REQUIRED: type hints on ALL public functions and methods (no Any
        unless justified inline). Docstrings on ALL public-API functions.
        pathlib over os.path.
        REJECT: bare except (require `except Exception:` minimum). print()
        outside CLI / tools / bin (use logging). subprocess.* without
        timeout= kwarg. string-formatted SQL (require parameter binding).
        hard-coded secrets, API keys, tokens (env vars / keychain only).
        eval / exec / os.system on any input. requests.* / urllib.* without
        timeout=. concurrent.futures.as_completed(timeout=N) loops that
        rely on per-future timeout via fut.result(timeout=M) (aggregate
        timeout only; banked 2026-05-24).
        REJECT in docstrings / comments: em dashes, schoolbook step
        enumeration, first-person plural, marketing words.
    - path: "**/*.sh"
      instructions: |
        Shell script. POSIX-compatible unless shebang explicitly bash.
        REJECT: unquoted variable expansions, missing `set -euo pipefail`
        in bash scripts, curl/wget without --fail or -fsSL, rm -rf with
        variable paths, `docker run --rm` wrapped in `timeout` (ghost
        container leak; banked 2026-05-23 in
        feedback_docker_timeout_rm_ghost_containers_2026_05_23.md).
    - path: "**/*.ps1"
      instructions: |
        PowerShell script. pwsh (PS7) idioms only.
        REJECT: Write-Host (use Write-Output / Write-Information). Missing
        $ErrorActionPreference = 'Stop'. Invoke-Expression with
        interpolated input. powershell.exe invocation (use pwsh.exe per
        Class 158 baseline).
    - path: "**/*.go"
      instructions: |
        Go. Verify error wrap (`fmt.Errorf` with %w). REJECT: goroutine
        leaks (missing context cancellation). Panics in library code.
        time.Sleep in production paths (use context.WithTimeout).
    - path: "**/*.{cpp,hpp,cc,hh,h,cxx}"
      instructions: |
        C++17/20 (PonoPrint slicer scope). PascalCase classes, snake_case
        functions/variables. `#pragma once` for headers. Smart pointers
        and RAII preferred. REJECT: raw new/delete outside RAII wrappers.
        TBB shared mutable state without lock.
    - path: "**/*.swift"
      instructions: |
        Swift. iOS / Swift latest.
        REJECT: SwiftData @Model classes missing the @Model decorator
        (instant crash). SwiftData mutations (insert/delete/save) in
        SwiftUI view body evaluation chain. Force-unwraps in production.
    - path: "**/*.{kt,kts}"
      instructions: |
        Kotlin. Coroutine-safe.
        REJECT: GlobalScope.launch in production. !! force-unwraps.
        Missing Dispatchers.IO / Dispatchers.Default for blocking work.
    - path: "**/*.{js,jsx,ts,tsx}"
      instructions: |
        JavaScript / TypeScript. Latest Node.
        REJECT: `any` in TypeScript (require explicit type). eval / new
        Function. innerHTML with user input (XSS). fetch without timeout
        (use AbortController).
    - path: "**/*.rs"
      instructions: |
        Rust.
        REJECT: .unwrap() / .expect() in library code (return Result).
        unsafe blocks without a `// SAFETY:` comment.
    - path: ".github/workflows/*.yml"
      instructions: &workflow_review_instructions |
        GitHub Actions workflow.
        REQUIRED: permissions: block (minimal), pinned action versions
        (SHA preferred, tag minimum), timeout-minutes on every job,
        concurrency group to prevent runaway parallel runs.
        REJECT: `${{ github.event.pull_request.* }}` without is_owner
        check (script-injection vector). actions/checkout without
        persist-credentials: false unless write access is required.
        Any `runs-on: windows-*` that is not converted to `[self-hosted,
        Windows, X64, pono-build]` per Class 181/220 node-one topology.
    - path: ".github/workflows/*.yaml"
      instructions: *workflow_review_instructions
    - path: "**/Dockerfile*"
      instructions: |
        Dockerfile.
        REQUIRED: pinned base image (digest preferred, tag minimum),
        multi-stage build for compiled outputs, HEALTHCHECK.
        REJECT: RUN apt-get install without rm -rf /var/lib/apt/lists/*.
        ADD that should be COPY. USER root at end of file.
        Default Python image is python:3.14-slim per CLAUDE.md.
    - path: "**/requirements*.txt"
      instructions: |
        Pinned Python deps.
        REJECT: unpinned or range-pinned entries (==X.Y.Z preferred over
        >=). Packages not on PyPI or unsigned-source. Known-vuln packages
        (osv-scanner cross-check).
    - path: "**/pyproject.toml"
      instructions: |
        Python project manifest.
        REQUIRED: requires-python set. Dependencies version-pinned (>=
        acceptable, == preferred).
        REJECT: abandoned packages.
    - path: "**/*.{service,timer,target,socket}"
      instructions: |
        systemd unit. Production.
        REQUIRED: Restart=, RestartSec=, User=, Group=, WorkingDirectory=,
        ExecStart= absolute paths, TimeoutStartSec=, TimeoutStopSec=.
        Cross-check Class 79 silent-failure (docker direct kills compose).
        Prefer ProtectSystem=full or strict where viable.
    - path: "CLAUDE.md"
      instructions: |
        Tier-3 path (Class 226). Edits change every session's substrate.
        REQUIRED: new rules carry anchor (date + reason + cross-ref).
        Standing-order conflicts called out explicitly. Recognition
        signal for new rules.
    - path: "skill_pono_*.md"
      instructions: |
        Tier-3 catalog (Class library / meta-analyst).
        REQUIRED: new Class entries have all 8 sections (Symptom,
        Mechanism, Why naive fails, Correct pattern, Recognition signal,
        Cross-refs, Date, Originating instance). No duplicate Class IDs.
    - path: "maui-wall/*.py"
      instructions: |
        Tier-3 hook code (Class 226).
        REQUIRED: fail-open behavior on V1 ships (Class 224 contract).
        JSONL audit log per Class 224 contract.
    - path: "docs/plans/*.md"
      instructions: |
        Tier-3 planning / handoff governance doc (Class 226).
        REJECT: stale anchors (dates older than 2 weeks without
        re-anchor). Missing smoke matrix on substrate-behavior changes
        per Class 249.

  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
    simplify:
      enabled: true

  pre_merge_checks:
    # v3 max-strict: every check at error mode. With
    # request_changes_workflow: true above, failing checks block merge via
    # commit status. override_requested_reviewers_only restricts override
    # to designated reviewers (not the PR author).
    override_requested_reviewers_only: true
    docstrings:
      mode: error
      threshold: 100
    title:
      mode: error
      requirements: |
        MUST be under 70 characters. MUST be imperative mood ("add X",
        "fix Y", "remove Z").
        MUST NOT contain em dashes (U+2014).
        MUST NOT contain internal classification prefixes: Class N, G01,
        G04, Sev1, Tier-A, Tier-B, F02, N1, N24.
        MUST NOT contain tags: [REVIEW-ONLY], [WIP], [DRAFT].
        MUST NOT contain marketing words: elegant, robust, comprehensive,
        seamless, beautifully, carefully, gracefully.
        SHOULD start with a scope prefix (component:, area/) OR a verb.
    description:
      mode: error
    issue_assessment:
      mode: error
    custom_checks:
      - name: no-em-dashes
        mode: error
        instructions: |
          Reject the PR if the title or body contains em dashes (U+2014,
          rendered as the long dash). Em dashes are a documented AI-tell
          per CLAUDE.md "No em dashes" standing rule (line 145). Use
          commas, periods, or hyphens instead. Scope: PR title + PR body
          + new comments/docs added in the diff. Do not flag em dashes
          inside upstream/vendor code or quoted text from external
          sources.
      - name: no-ai-tell-prefixes
        mode: error
        instructions: |
          Reject the PR if the title or body contains internal
          classification prefixes used in Pono's memory system: Class N
          (any number), G01, G04, Sev1, Tier-A, Tier-B, F02, N1, N24.
          Also reject [REVIEW-ONLY], [WIP], [DRAFT] in the title. Per
          CLAUDE.md "Zero noise output" standing rule, these prefixes
          never ship to visible surfaces.
      - name: no-marketing-words
        mode: error
        instructions: |
          Reject the PR if the title, body, commit message, code comment,
          or markdown content added in this diff contains any of:
          elegant, robust, comprehensive, seamless, beautifully,
          carefully, gracefully, elegantly, robustly. Per CLAUDE.md
          "Zero noise output" standing rule. Exception: internal memory
          files under .claude/projects/.../memory/ are local-only and
          out of scope.
      - name: no-anchor-lines
        mode: error
        instructions: |
          Reject the PR body if it contains schoolbook anchor lines used
          for internal scaffolding: "Anchored on:", "Pair:", "see
          HANDOFF-", "audits/cosmos_v4_full_audit_". Per CLAUDE.md "Zero
          noise output" standing rule, these never ship to public PR
          surfaces. Internal memory files are out of scope.
      - name: no-first-person-plural-narrative
        mode: error
        instructions: |
          Reject the PR title/body if it starts with or prominently
          contains schoolbook narrative phrases: "This commit", "This
          change", "We anchor", "We observe", "We add", "We introduce",
          "In this PR". Per CLAUDE.md "Zero noise output" standing rule
          on first-person plural in visible text. State the change
          directly without narrative scaffolding.
      - name: subprocess-must-have-timeout
        mode: error
        instructions: |
          For every Python diff that adds subprocess.run /
          subprocess.Popen / subprocess.call / subprocess.check_output /
          subprocess.check_call, verify a timeout= kwarg is present.
          Reject the PR if absent. Hung subprocesses leak resources
          (banked 2026-05-23 in
          feedback_docker_timeout_rm_ghost_containers_2026_05_23.md
          shows the failure-mode shape).
      - name: no-bare-except
        mode: error
        instructions: |
          Reject any Python diff adding `except:` (bare). Require
          `except Exception:` minimum, ideally a specific exception
          type. Per CLAUDE.md path_instructions for *.py.
      - name: no-print-in-service-code
        mode: error
        instructions: |
          Reject print() in Python service code. Service code lives
          under src/, lib/, services/, daemons/, app/, api/. CLI tools
          under tools/, bin/, scripts/ may use print. Library code that
          may be imported by a service uses logging. Per CLAUDE.md
          path_instructions for *.py.
      - name: no-string-formatted-sql
        mode: error
        instructions: |
          Reject any Python diff that builds SQL via f-string,
          .format(), or % formatting on identifiers or values that may
          contain user input. Require parameter binding: `execute(sql,
          params)`. SQL injection vector. Per CLAUDE.md security
          baseline.
      - name: no-hardcoded-secrets
        mode: error
        instructions: |
          Reject any diff that adds string literals matching common
          secret patterns: AWS access keys (AKIA followed by 16 chars),
          GitHub tokens (ghp_, ghs_, gho_, github_pat_ prefixes),
          Anthropic keys (sk-ant- prefix), generic api_key="..." /
          secret="..." with 20+ char string values. Per CLAUDE.md
          "Security baseline" - env vars or keychain only.
      - name: tier-3-edit-requires-anchor
        mode: error
        instructions: |
          For diffs touching Tier-3 paths (CLAUDE.md, skill_pono_*.md,
          *.service, *.timer, nodecode.py, install.sh, maui-wall/*.py,
          tools/recall_session.py, tools/foundry_draft.py,
          tools/session_lane_surface.py, tools/session_branch_marker.py,
          legal/*, contracts/*, docs/plans/*, HANDOFF-*.md, PHASE-*.md,
          *-PLAN.md), require: PR body explains the why, cross-refs
          existing standing orders if changing one, includes a
          Class-numbered anchor for new rules. Per Class 226 (Tier-3
          Edit Gate, 2026-05-18).
      - name: foundation-flawless-smoke-matrix
        mode: error
        instructions: |
          For PRs that change substrate behavior (new endpoint, new
          pipeline stage, new container, new config category, new
          flag-detection class, new egress path, new hook), require a
          smoke matrix document under docs/plans/ in the same PR before
          merge. Per Class 249 (Foundation-Flawless Before
          Scope-Addition, 2026-05-24 HARD requirement).
      - name: ci-bot-hygiene-passes
        mode: error
        instructions: |
          Per CLAUDE.md "CI / Bot / Workflow Hygiene" HARD requirement
          (2026-05-17), every commit must pass all bots and workflows.
          Verify the PR's check runs are all green and no dependabot
          security alerts are introduced before allowing merge.
      - name: signed-supply-chain-for-production
        mode: error
        instructions: |
          For PRs touching production-class firmware / OS / runtime /
          distro bases (systems handling physical risk: heat, motion,
          electric current, identity, money, voice, customer hardware),
          require the scoring rubric from
          skill_production_firmware_stack_scorecard.md is present in the
          PR body or referenced doc. Per CLAUDE.md "Signed-first Supply
          Chain" HARD requirement (Class 242, 2026-05-23). Production
          stacks scoring under 20 of 24 MUST NOT merge.

