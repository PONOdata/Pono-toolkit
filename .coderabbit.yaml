# CodeRabbit configuration for PONOdata/Pono-toolkit
# Profile: assertive (HARDEST per Jack 2026-05-18 directive)
# Anchored: CLAUDE.md "CI / Bot / Workflow Hygiene" HARD requirement (banked 2026-05-17)

language: en-US

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_filters:
    - "!**/__pycache__/**"
    - "!**/*.pyc"
    - "!**/.venv/**"
    - "!**/venv/**"
    - "!**/.tox/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/*.egg-info/**"
    - "!**/.pytest_cache/**"
    - "!**/.mypy_cache/**"
    - "!**/.ruff_cache/**"
    - "!**/node_modules/**"
    - "!**/.git/**"
    - "!logs/**"
    - "!**/*.log"
    - "!state/**/*.json"

  path_instructions:
    - path: "**/*.py"
      instructions: |
        Python service code. HARDEST review posture per fleet rollout 2026-05-18.
        Verify type hints on all public functions and methods. Prefer pathlib over
        os.path. Reject bare except. Reject print() for logs (use logging). Flag
        subprocess.* calls without timeout=. Flag em-dashes, schoolbook step
        enumeration, and first-person pronouns in docstrings or comments. Flag
        any string-formatted SQL (use parameter binding). Flag hard-coded
        secrets, API keys, tokens. Verify no eval/exec on untrusted input.
        Flag missing docstrings on public-API functions.
    - path: "**/*.sh"
      instructions: |
        Shell script. POSIX-compatible unless shebang is explicitly bash. Flag
        unquoted variable expansions, missing set -euo pipefail in bash scripts,
        curl/wget without --fail or -fsSL, and any rm -rf with variable paths.
    - path: ".github/workflows/*.yml"
      instructions: &workflow_review_instructions |
        GitHub Actions workflow. Verify minimal permissions: block, pinned action
        versions (SHA preferred, tag minimum), timeout-minutes on every job,
        concurrency group to prevent runaway parallel runs. Flag any usage of
        ${{ github.event.pull_request.* }} without is_owner check (script-
        injection vector). Flag actions/checkout without persist-credentials:
        false unless write access is required.
    - path: ".github/workflows/*.yaml"
      # CodeRabbit globbing does not support brace expansion; duplicate the
      # entry so .yaml workflow files get the same review instructions as .yml.
      instructions: *workflow_review_instructions
    - path: "**/Dockerfile*"
      instructions: |
        Dockerfile. Verify pinned base image (digest preferred, tag minimum).
        Flag RUN apt-get install without rm -rf /var/lib/apt/lists/*. Flag any
        ADD that should be COPY. Flag USER root at end of file. Flag HEALTHCHECK
        absent. Verify multi-stage build for compiled language outputs.
    - path: "**/requirements*.txt"
      instructions: |
        Pinned Python deps. Flag any unpinned or range-pinned entries (==X.Y.Z
        preferred over >=). Flag any package not on PyPI or unsigned-source.
    - path: "pyproject.toml"
      instructions: |
        Python project manifest. Verify requires-python is set, dependencies are
        version-pinned (>= acceptable, == preferred), no abandoned packages.

  tools:
    github-checks:
      enabled: true
    languagetool:
      enabled: false
    ruff:
      enabled: true
    markdownlint:
      enabled: true
    shellcheck:
      enabled: true
    yamllint:
      enabled: true
    actionlint:
      enabled: true
    hadolint:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
